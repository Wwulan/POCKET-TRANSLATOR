name: flutter_application_2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Native iOS style icons configuration set
  cupertino_icons: ^1.0.8

  # Local AI Model for Text Translation (Edge Computing Core)
  google_mlkit_translation: ^0.11.0
  
  # On-device Native Speech Processing Engine (Voice-to-Text Peripheral)
  speech_to_text: ^6.6.0
  
  # Text-to-Speech Processing Hub for Verbal Communication Output
  flutter_tts: ^4.1.0
  
  # High-performance Key-Value NoSQL Engine for Local Data Storage
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Production lints for static code analysis optimization
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true